<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact BuraqLogistics for freight inquiries, quotes, and shipment questions. Call, email, or fill out our inquiry form." />
  <title>Contact Us — BuraqLogistics Logistics</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/contact.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="navbar__logo">
        <div class="navbar__logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/>
          </svg>
        </div>
        <span class="navbar__logo-text">Buraq<span>Logistics</span></span>
      </a>

      <ul class="navbar__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="how-it-works.html">How It Works</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>

      <a href="contact.html" class="navbar__cta">Get a Quote</a>

      <button class="navbar__hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- FIXED: changed nav → div -->
    <div class="navbar__mobile-menu">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>


  <!-- HERO -->
  <header class="page-hero">
    <div class="container">
      <h1>Contact BuraqLogistics</h1>
      <p>Reach out to us for freight services and inquiries.</p>
    </div>
  </header>


  <!-- CONTACT -->
  <section class="contact-main">
    <div class="container">

      <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="1007286b-99d3-440d-91c3-d6b7ca450d60" />

        <input type="text" name="full_name" placeholder="Full Name" required />
        <input type="text" name="company" placeholder="Company Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="phone" placeholder="Phone" required />

        <select name="service_type" required>
          <option value="">Select Service</option>
          <option value="road">Road</option>
          <option value="railway">Railway</option>
          <option value="air">Air</option>
        </select>

        <input type="text" name="cargo_type" placeholder="Cargo Description" required />
        <textarea name="message" placeholder="Message"></textarea>

        <button type="submit">Send Inquiry</button>
      </form>

    </div>
  </section>


  <!-- MAP SECTION -->
  <section class="contact-map">
    <div class="container">

      <h2>Our Location</h2>

      <div class="map-embed">

        <!-- ✅ WORKING GOOGLE MAP -->
        <iframe
          src="https://www.google.com/maps?q=24.8501779,67.0096958&output=embed"
          width="100%"
          height="450"
          style="border:0;"
          allowfullscreen=""
          loading="lazy">
        </iframe>

      </div>

    </div>
  </section>


  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2025 BuraqLogistics Logistics</p>
    </div>
  </footer>

</body>
</html>
